- name: рџ“± Kirim Notifikasi Telegram
run: |
          STATUS="${{ github.event.client_payload.status || github.event.inputs.status || 'TEST' }}"
          LOCATION="${{ github.event.client_payload.location || 'Lampu kamar' }}"
          TIMESTAMP="${{ github.event.client_payload.timestamp || 'Manual Test' }}"
          LDR_VALUE="${{ github.event.client_payload.ldr_value || github.event.inputs.ldr_value || '0' }}"

          if [ "$STATUS" == "STARTUP" ]; then
            MESSAGE="рџџў <b>SISTEM AKTIF</b>\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ“Ў ESP32 Sensor LDR menyala\nрџ“Ќ Lokasi: ${LOCATION}\nрџ•ђ Waktu: ${TIMESTAMP}\nрџ’Ў Nilai LDR: ${LDR_VALUE}\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nвњ… Siap mendeteksi cahaya ruangan"
          else
            MESSAGE="рџљЁ <b>RUANGAN GELAP</b>\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nрџ“Ў Status: ${STATUS}\nрџ“Ќ Lokasi: ${LOCATION}\nрџ•ђ Waktu: ${TIMESTAMP}\nрџ’Ў Nilai LDR: ${LDR_VALUE}\nв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓв”Ѓ\nвљ пёЏ Segera cek lokasi sensor!"
          fi

          # Membuat JSON secara aman menggunakan jq
          JSON_PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" \
            --arg text "$MESSAGE" \
            --arg parse_mode "HTML" \
            '{chat_id: $chat_id, text: $text, parse_mode: $parse_mode}')

          echo "Mengirim payload JSON berikut:"
          echo "$JSON_PAYLOAD"

          echo "Menghubungi API Telegram..."
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD"

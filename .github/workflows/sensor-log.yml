- name: 📱 Kirim Notifikasi Telegram
        run: |
          STATUS="${{ github.event.client_payload.status || github.event.inputs.status || 'TEST' }}"
          LOCATION="${{ github.event.client_payload.location || 'Lampu kamar' }}"
          TIMESTAMP="${{ github.event.client_payload.timestamp || 'Manual Test' }}"
          LDR_VALUE="${{ github.event.client_payload.ldr_value || github.event.inputs.ldr_value || '0' }}"

          if [ "$STATUS" == "STARTUP" ]; then
            MESSAGE="🟢 <b>SISTEM AKTIF</b>
          ━━━━━━━━━━━━━━━━━━━━
          📡 ESP32 Sensor LDR menyala
          📍 Lokasi: ${LOCATION}
          🕐 Waktu: ${TIMESTAMP}
          💡 Nilai LDR: ${LDR_VALUE}
          ━━━━━━━━━━━━━━━━━━━━
          ✅ Siap mendeteksi cahaya ruangan"
          else
            MESSAGE="🚨 <b>RUANGAN GELAP</b>
          ━━━━━━━━━━━━━━━━━━━━
          📡 Status: ${STATUS}
          📍 Lokasi: ${LOCATION}
          🕐 Waktu: ${TIMESTAMP}
          💡 Nilai LDR: ${LDR_VALUE}
          ━━━━━━━━━━━━━━━━━━━━
          ⚠️ Segera cek lokasi sensor!"
          fi

          # Membuat JSON secara aman menggunakan jq
          JSON_PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" \
            --arg text "$MESSAGE" \
            --arg parse_mode "HTML" \
            '{chat_id: $chat_id, text: $text, parse_mode: $parse_mode}')

          # Mengirim request tanpa disembunyikan (-s) agar output/error terlihat di log
          echo "Mengirim notifikasi ke Telegram..."
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD"
            
          echo -e "\n✅ Proses curl selesai dijalankan!"

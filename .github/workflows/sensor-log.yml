name: Log Sensor LDR

on:
  repository_dispatch:
    types: [sensor_update]
  workflow_dispatch:
    inputs:
      status:
        description: 'Status (AMAN/BAHAYA)'
        required: false
        default: 'AMAN'
      kondisi:
        description: 'Kondisi cahaya'
        required: false
        default: 'Cahaya terang'
      ldr_value:
        description: 'Nilai LDR'
        required: false
        default: '0'

permissions:
  contents: write

jobs:
  log-and-notify:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📝 Simpan Data ke CSV
        run: |
          STATUS="${{ github.event.client_payload.status || github.event.inputs.status || 'TEST' }}"
          KONDISI="${{ github.event.client_payload.kondisi || github.event.inputs.kondisi || 'Unknown' }}"
          LOCATION="${{ github.event.client_payload.location || 'Lampu kamar' }}"
          TIMESTAMP="${{ github.event.client_payload.timestamp || 'Manual Test' }}"
          LDR_VALUE="${{ github.event.client_payload.ldr_value || github.event.inputs.ldr_value || '0' }}"

          # Pastikan direktori logs ada
          mkdir -p logs

          # Buat file CSV baru dengan header yang benar jika belum ada atau format lama
          HEADER="Tanggal_Waktu,Status,Kondisi,Lokasi,Nilai_LDR"
          if [ ! -f logs/sensor_log.csv ] || ! head -1 logs/sensor_log.csv | grep -q "Kondisi"; then
            echo "$HEADER" > logs/sensor_log.csv
            echo "📋 File CSV baru dibuat dengan format terbaru"
          fi

          # Tambahkan data baru ke CSV
          echo "${TIMESTAMP},${STATUS},${KONDISI},${LOCATION},${LDR_VALUE}" >> logs/sensor_log.csv

          TOTAL_LOG=$(tail -n +2 logs/sensor_log.csv | wc -l)
          echo "✅ Data berhasil ditambahkan ke CSV (Total: ${TOTAL_LOG} data)"
          echo "📊 Status: ${STATUS} | Kondisi: ${KONDISI} | LDR: ${LDR_VALUE}"

      - name: 📊 Update README
        run: |
          STATUS="${{ github.event.client_payload.status || github.event.inputs.status || 'TEST' }}"
          KONDISI="${{ github.event.client_payload.kondisi || github.event.inputs.kondisi || 'Unknown' }}"
          LOCATION="${{ github.event.client_payload.location || 'Lampu kamar' }}"
          TIMESTAMP="${{ github.event.client_payload.timestamp || 'Manual Test' }}"
          LDR_VALUE="${{ github.event.client_payload.ldr_value || github.event.inputs.ldr_value || '0' }}"
          TOTAL_LOG=$(tail -n +2 logs/sensor_log.csv | wc -l)

          cat > README.md << 'HEREDOC_END'
          # 📡 ESP8266 Sensor LDR - Monitor Cahaya

          > Sistem monitoring intensitas cahaya menggunakan ESP8266 + Sensor LDR
          > Notifikasi via Telegram | Data tersimpan di GitHub | Dashboard Interaktif

          ## 📊 Status Terakhir

          | Item | Detail |
          |------|--------|
          HEREDOC_END

          # Tambahkan baris dinamis
          echo "| 🔔 Status | **${STATUS}** |" >> README.md
          echo "| 💡 Kondisi | **${KONDISI}** |" >> README.md
          echo "| 📍 Lokasi | ${LOCATION} |" >> README.md
          echo "| 🕐 Waktu | ${TIMESTAMP} |" >> README.md
          echo "| 📈 Nilai LDR | ${LDR_VALUE} |" >> README.md
          echo "| 📁 Total Log | ${TOTAL_LOG} data |" >> README.md

          cat >> README.md << 'HEREDOC_END'

          ## 📂 File Log

          Data lengkap di [`logs/sensor_log.csv`](logs/sensor_log.csv)

          ## 🌐 Dashboard

          Buka [`index.html`](index.html) untuk melihat dashboard interaktif

          ## 🏗️ Arsitektur

          ```
          [Sensor LDR] → [ESP8266] → [GitHub API] → [GitHub Actions] → [Telegram Bot]
                                                                      → [Log CSV]
                                                                      → [Dashboard]
          ```

          ## 📋 Parameter Sensor (Jurnal LDR)

          | No | Kondisi Cahaya | Nilai ADC | Status | Keterangan |
          |----|----------------|-----------|--------|------------|
          | 1 | Gelap total | ≥ 3763 | 🔴 BAHAYA | Intensitas cahaya sangat rendah |
          | 2 | Remang-remang | 2400 - 3762 | 🟢 AMAN | Cahaya redup/samar |
          | 3 | Cahaya terang | 1040 - 2399 | 🟢 AMAN | Cahaya cukup terang |
          | 4 | Cahaya sangat terang | < 1040 | 🟢 AMAN | Paparan cahaya tinggi |

          ---
          HEREDOC_END

          echo "*Diperbarui otomatis pada ${TIMESTAMP}*" >> README.md

      - name: 💾 Commit & Push Data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/sensor_log.csv README.md
          git diff --quiet --cached && echo "Tidak ada perubahan" && exit 0
          git commit -m "📊 Log sensor: ${{ github.event.client_payload.kondisi || 'update' }} (LDR: ${{ github.event.client_payload.ldr_value || '0' }})"
          git push

      - name: 📱 Kirim Notifikasi Telegram (Hanya BAHAYA)
        if: github.event.client_payload.trigger_telegram == 'true'
        run: |
          STATUS="${{ github.event.client_payload.status }}"
          KONDISI="${{ github.event.client_payload.kondisi }}"
          LOCATION="${{ github.event.client_payload.location || 'Lampu kamar' }}"
          TIMESTAMP="${{ github.event.client_payload.timestamp || 'Unknown' }}"
          LDR_VALUE="${{ github.event.client_payload.ldr_value || '0' }}"

          MESSAGE=$(cat << EOF
          🚨 <b>BAHAYA - GELAP TOTAL!</b>
          ━━━━━━━━━━━━━━━━━━━━
          📡 Status: ${STATUS}
          💡 Kondisi: ${KONDISI}
          📍 Lokasi: ${LOCATION}
          🕐 Waktu: ${TIMESTAMP}
          📈 Nilai LDR: ${LDR_VALUE}
          ━━━━━━━━━━━━━━━━━━━━
          ⚠️ Intensitas cahaya sangat rendah!
          Segera cek lokasi sensor!
          EOF
          )

          # Membuat JSON secara aman menggunakan jq
          JSON_PAYLOAD=$(jq -n \
            --arg chat_id "${{ secrets.TELEGRAM_CHAT_ID }}" \
            --arg text "$MESSAGE" \
            --arg parse_mode "HTML" \
            '{chat_id: $chat_id, text: $text, parse_mode: $parse_mode}')

          echo "📱 Mengirim notifikasi Telegram (BAHAYA)..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "📬 HTTP Response: ${HTTP_CODE}"
          echo "📦 Body: ${BODY}"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Notifikasi Telegram berhasil terkirim!"
          else
            echo "❌ Gagal mengirim notifikasi Telegram!"
            exit 1
          fi
